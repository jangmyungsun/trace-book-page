<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; padding:40px; line-height:1.8;">

<p>숨을 느껴보세요</p>

<input type="file" accept="audio/*" capture id="rec">

<p id="status" style="opacity:0.4; font-size:12px;"></p>

<script>
// 세션 시작
if (!sessionStorage.getItem("trace_session")) {
  sessionStorage.setItem("trace_session", "active");
}

const status = document.getElementById("status");

if(localStorage.getItem("breath")){
  status.innerText = "이미 남겨진 숨이 있습니다";
}

document.getElementById("rec").onchange = function(e){

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onloadend = function(){
    localStorage.setItem("breath", reader.result);
    status.innerText = "숨이 기록되었습니다";
  };

  reader.readAsDataURL(file);
};
</script>

<p style="margin-top:40px; opacity:0.3; font-size:11px;">
같은 브라우저에서 이어주세요
</p>

</body>
</html>
