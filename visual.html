<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; padding:40px;">

<p id="play" style="cursor:pointer;">
소리를 들어보세요
</p>

<p id="guide" style="opacity:0.4; font-size:12px;"></p>

<canvas id="canvas" width="300" height="300" style="margin-top:40px;"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function generateSeed(str){
  let sum = 0;
  for(let i=0;i<str.length;i++){
    sum += str.charCodeAt(i);
  }
  return sum;
}

function draw(seed, offsetY){

  let t = 0;

  function loop(){

    ctx.beginPath();

    for(let i=0;i<150;i++){

      const x = i * 2;

      // 🔴 seed 기반 변형 (핵심)
      const y = offsetY + Math.sin(i*0.1 + t + seed*0.01) * (10 + seed % 20);

      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }

    ctx.strokeStyle = "#111";
    ctx.stroke();

    t += 0.05;

    requestAnimationFrame(loop);
  }

  loop();
}

document.getElementById("play").onclick = function(){

  const breath = localStorage.getItem("breath");
  const ambient = localStorage.getItem("ambient");
  const personal = localStorage.getItem("personal");

  if (!breath || !ambient || !personal) {
    document.getElementById("guide").innerText = "기록이 부족합니다";
    return;
  }

  document.getElementById("guide").innerText = "각 소리는 다른 형태로 나타납니다";

  ctx.clearRect(0,0,300,300);

  // 🔴 seed 생성
  const s1 = generateSeed(breath);
  const s2 = generateSeed(ambient);
  const s3 = generateSeed(personal);

  // 🔴 소리 재생 (안정)
  new Audio(breath).play();
  setTimeout(()=>new Audio(ambient).play(), 800);
  setTimeout(()=>new Audio(personal).play(), 1600);

  // 🔴 시각화
  draw(s1, 80);
  setTimeout(()=>draw(s2,150),800);
  setTimeout(()=>draw(s3,220),1600);
};

</script>

</body>
</html>
