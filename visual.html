<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; padding:40px;">

<p id="play" style="cursor:pointer;">
소리를 들어보세요
</p>

<canvas id="canvas" width="300" height="300" style="margin-top:40px;"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 🔴 base64 → seed 생성
function getSeed(str){
  let sum = 0;
  for(let i=0;i<str.length;i++){
    sum += str.charCodeAt(i);
  }
  return sum;
}

// 🔴 blob 생성
function drawBlob(seed){

  let t = 0;

  function draw(){

    ctx.fillStyle = "rgba(255,255,255,0.1)";
    ctx.fillRect(0,0,300,300);

    ctx.beginPath();

    for(let i=0;i<Math.PI*2;i+=0.1){

      // 🔴 seed 기반 변화
      const r = 60 + Math.sin(i* (seed%10) + t) * (20 + seed%30);

      const x = 150 + Math.cos(i) * r;
      const y = 150 + Math.sin(i) * r;

      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }

    ctx.closePath();
    ctx.strokeStyle = "#111";
    ctx.stroke();

    t += 0.05;

    requestAnimationFrame(draw);
  }

  draw();
}

// 🔴 실행
document.getElementById("play").onclick = function(){

  const breath = localStorage.getItem("breath");

  if(!breath){
    alert("소리 없음");
    return;
  }

  // 🔴 소리 재생 (이건 안정)
  new Audio(breath).play();

  ctx.clearRect(0,0,300,300);

  const seed = getSeed(breath);

  drawBlob(seed);
};

</script>

</body>
</html>
