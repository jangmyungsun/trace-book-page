<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; padding:40px;">

<p id="play" style="cursor:pointer;">
소리를 들어보세요
</p>

<p id="guide" style="opacity:0.4; font-size:12px;"></p>

<canvas id="canvas" width="300" height="300" style="margin-top:40px;"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let running = false;

// 🔴 랜덤 기반 "소리 느낌" 움직임
function animateLine(offsetY, intensity){

  let t = 0;

  function draw(){

    if(!running) return;

    ctx.beginPath();

    for(let i=0; i<150; i++){

      const x = i * 2;

      // 🔴 소리 느낌 (진동)
      const y = offsetY + Math.sin(i*0.1 + t) * intensity;

      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }

    ctx.strokeStyle = "#111";
    ctx.lineWidth = 1;
    ctx.stroke();

    t += 0.1;

    requestAnimationFrame(draw);
  }

  draw();
}

// 🔴 실행
document.getElementById("play").onclick = function(){

  const breath = localStorage.getItem("breath");
  const ambient = localStorage.getItem("ambient");
  const personal = localStorage.getItem("personal");

  if (!breath || !ambient || !personal) {
    document.getElementById("guide").innerText = "아직 기록이 부족합니다";
    return;
  }

  document.getElementById("guide").innerText = "소리가 흔적으로 남습니다";

  ctx.clearRect(0, 0, 300, 300);

  running = true;

  // 🔴 소리 재생 (이건 확실히 됨)
  const a1 = new Audio(breath);
  const a2 = new Audio(ambient);
  const a3 = new Audio(personal);

  a1.play();
  setTimeout(()=>a2.play(), 800);
  setTimeout(()=>a3.play(), 1600);

  // 🔴 움직임 (소리 느낌)
  animateLine(80, 10);
  setTimeout(()=>animateLine(150, 15), 800);
  setTimeout(()=>animateLine(220, 20), 1600);
};

</script>

</body>
</html>
