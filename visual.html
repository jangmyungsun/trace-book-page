<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; padding:40px;">

<p id="play" style="cursor:pointer;">
테스트 (이미지 생성)
</p>

<canvas id="canvas" width="300" height="300" style="margin-top:40px; border:1px solid #eee;"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 🔴 단순 waveform (AudioContext 안 씀)
function drawSimpleWave(base64, offsetY){

  const audio = new Audio(base64);

  // duration 기반으로 랜덤 생성 (fallback 방식)
  audio.onloadedmetadata = function(){

    const len = Math.floor(audio.duration * 50);

    ctx.beginPath();

    for(let i=0; i<len; i++){

      const x = i * 3;
      const y = offsetY + (Math.random() - 0.5) * 40;

      if(i===0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    ctx.strokeStyle = "#111";
    ctx.lineWidth = 1;
    ctx.stroke();
  };
}

// 🔴 메인 실행
document.getElementById("play").onclick = function(){

  const breath = localStorage.getItem("breath");
  const ambient = localStorage.getItem("ambient");
  const personal = localStorage.getItem("personal");

  if (!breath || !ambient || !personal) {
    alert("데이터 없음");
    return;
  }

  // 초기화
  ctx.clearRect(0, 0, 300, 300);

  // 소리 재생
  [breath, ambient, personal].forEach((src, i)=>{
    const audio = new Audio(src);
    setTimeout(()=>audio.play(), i*800);
  });

  // 이미지 생성
  drawSimpleWave(breath, 80);
  drawSimpleWave(ambient, 150);
  drawSimpleWave(personal, 220);
};

</script>

</body>
</html>
