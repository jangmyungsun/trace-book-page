<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; padding:40px;">

<p id="play" style="cursor:pointer;">
소리를 들어보세요
</p>

<p id="guide" style="opacity:0.4; font-size:12px;"></p>

<canvas id="canvas" width="300" height="300" style="margin-top:40px;"></canvas>

<script>

let audioCtx;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 🔴 핵심: 에너지 기반 시각화
async function reactiveVisual(base64){

  const response = await fetch(base64);
  const buffer = await response.arrayBuffer();
  const audioBuffer = await audioCtx.decodeAudioData(buffer);

  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;

  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;

  source.connect(analyser);
  analyser.connect(audioCtx.destination);

  source.start();

  const data = new Uint8Array(analyser.frequencyBinCount);

  function draw(){

    analyser.getByteFrequencyData(data);

    // 🔴 에너지 계산
    let sum = 0;
    for(let i=0;i<data.length;i++){
      sum += data[i];
    }
    const energy = sum / data.length;

    // 🔴 화면 전체 리셋 대신 잔상 남김
    ctx.fillStyle = "rgba(255,255,255,0.05)";
    ctx.fillRect(0,0,300,300);

    // 🔴 원 형태 (숨 느낌)
    const radius = energy * 0.5;

    ctx.beginPath();
    ctx.arc(150,150,radius,0,Math.PI*2);
    ctx.strokeStyle = "#111";
    ctx.stroke();

    requestAnimationFrame(draw);
  }

  draw();
}

// 🔴 실행
document.getElementById("play").onclick = async function(){

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  await audioCtx.resume();

  const breath = localStorage.getItem("breath");

  if (!breath){
    document.getElementById("guide").innerText = "데이터 없음";
    return;
  }

  document.getElementById("guide").innerText = "소리에 따라 형태가 변합니다";

  ctx.clearRect(0,0,300,300);

  reactiveVisual(breath);
};

</script>

</body>
</html>
