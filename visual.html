<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; padding:40px;">

<p id="play" style="cursor:pointer;">
소리를 들어보세요
</p>

<p id="guide" style="opacity:0.4; font-size:12px;"></p>

<canvas id="canvas" width="300" height="300" style="margin-top:40px;"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let running = false;

// 🔴 볼륨 기반 움직임
function animate(audio, offsetY){

  let t = 0;

  function draw(){

    if(!running) return;

    ctx.beginPath();

    // 🔴 현재 볼륨 (핵심)
    const intensity = (audio.volume || 0.5) * 30;

    for(let i=0; i<150; i++){

      const x = i * 2;
      const y = offsetY + Math.sin(i*0.1 + t) * intensity;

      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }

    ctx.strokeStyle = "#111";
    ctx.lineWidth = 1;
    ctx.stroke();

    t += 0.1;

    requestAnimationFrame(draw);
  }

  draw();
}

document.getElementById("play").onclick = function(){

  const breath = localStorage.getItem("breath");
  const ambient = localStorage.getItem("ambient");
  const personal = localStorage.getItem("personal");

  if (!breath || !ambient || !personal) {
    document.getElementById("guide").innerText = "아직 기록이 부족합니다";
    return;
  }

  ctx.clearRect(0, 0, 300, 300);
  running = true;

  document.getElementById("guide").innerText = "소리에 따라 흔적이 달라집니다";

  const a1 = new Audio(breath);
  const a2 = new Audio(ambient);
  const a3 = new Audio(personal);

  // 🔴 볼륨 약간 다르게 (차이 만들기)
  a1.volume = 0.3;
  a2.volume = 0.6;
  a3.volume = 1.0;

  a1.play();
  setTimeout(()=>a2.play(), 800);
  setTimeout(()=>a3.play(), 1600);

  animate(a1, 80);
  setTimeout(()=>animate(a2, 150), 800);
  setTimeout(()=>animate(a3, 220), 1600);
};

</script>

</body>
</html>
