<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; padding:40px;">

<p id="play" style="cursor:pointer;">
소리를 들어보세요
</p>

<canvas id="canvas" width="300" height="300" style="margin-top:40px;"></canvas>

<script>

let audioCtx;
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 🔴 핵심: blob 형태
async function reactiveBlob(base64){

  const response = await fetch(base64);
  const buffer = await response.arrayBuffer();

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  await audioCtx.resume();

  const audioBuffer = await audioCtx.decodeAudioData(buffer);

  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;

  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;

  source.connect(analyser);
  analyser.connect(audioCtx.destination);

  source.start();

  const data = new Uint8Array(analyser.frequencyBinCount);

  function draw(){

    analyser.getByteFrequencyData(data);

    // 🔴 피치 계산 (고주파 비율)
    let high = 0;
    for(let i=64;i<data.length;i++){
      high += data[i];
    }
    high /= 64;

    // 🔴 에너지 계산
    let sum = 0;
    for(let i=0;i<data.length;i++){
      sum += data[i];
    }
    const energy = sum / data.length;

    // 🔴 잔상
    ctx.fillStyle = "rgba(255,255,255,0.08)";
    ctx.fillRect(0,0,300,300);

    const centerX = 150;
    const centerY = 150;

    const baseRadius = energy * 0.6;

    ctx.beginPath();

    for(let i=0;i<Math.PI*2;i+=0.1){

      // 🔴 피치 영향 → 형태 울퉁불퉁
      const distortion = Math.sin(i*10 + high*0.1) * (high * 0.2);

      const r = baseRadius + distortion;

      const x = centerX + Math.cos(i) * r;
      const y = centerY + Math.sin(i) * r;

      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }

    ctx.closePath();

    ctx.strokeStyle = "#111";
    ctx.stroke();

    requestAnimationFrame(draw);
  }

  draw();
}

// 🔴 실행
document.getElementById("play").onclick = function(){

  const breath = localStorage.getItem("breath");

  if (!breath) {
    alert("데이터 없음");
    return;
  }

  ctx.clearRect(0,0,300,300);

  reactiveBlob(breath);
};

</script>

</body>
</html>
