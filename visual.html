<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; padding:40px;">

<p id="play" style="cursor:pointer;">
소리를 들어보세요 (움직임 테스트)
</p>

<canvas id="canvas" width="300" height="300" style="margin-top:40px;"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// 🔴 소리 → 움직임
async function playReactive(base64, offsetY){

  const response = await fetch(base64);
  const arrayBuffer = await response.arrayBuffer();
  const buffer = await audioCtx.decodeAudioData(arrayBuffer);

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;

  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;

  source.connect(analyser);
  analyser.connect(audioCtx.destination);

  source.start();

  const dataArray = new Uint8Array(analyser.frequencyBinCount);

  function draw(){

    analyser.getByteTimeDomainData(dataArray);

    ctx.beginPath();

    for(let i=0; i<dataArray.length; i++){

      const x = i * 2;
      const y = offsetY + (dataArray[i] - 128) * 0.5;

      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }

    ctx.strokeStyle = "#111";
    ctx.lineWidth = 1;
    ctx.stroke();

    requestAnimationFrame(draw);
  }

  draw();
}

// 🔴 실행
document.getElementById("play").onclick = async function(){

  const breath = localStorage.getItem("breath");
  const ambient = localStorage.getItem("ambient");
  const personal = localStorage.getItem("personal");

  if (!breath || !ambient || !personal) {
    alert("데이터 없음");
    return;
  }

  // 초기화
  ctx.clearRect(0, 0, 300, 300);

  await audioCtx.resume(); // 🔴 중요

  playReactive(breath, 80);
  setTimeout(()=>playReactive(ambient, 150), 800);
  setTimeout(()=>playReactive(personal, 220), 1600);
};

</script>

</body>
</html>
