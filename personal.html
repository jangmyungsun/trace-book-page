<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; padding:40px; line-height:1.8;">

<p>소리 하나를 남겨보세요</p>

<input type="file" accept="audio/*" capture id="rec">

<p id="status" style="opacity:0.4; font-size:12px;"></p>

<script>

const status = document.getElementById("status");

if(localStorage.getItem("personal")){
  status.innerText = "당신이 지금 좋아하는 소리";
}

document.getElementById("rec").onchange = function(e){

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onloadend = function(){
    localStorage.setItem("personal", reader.result);
    status.innerText = "기록되었습니다";
  };

  reader.readAsDataURL(file);
};
</script>

<p style="margin-top:40px; opacity:0.3; font-size:11px;">
책의 페이지를 넘기세요
</p>

</body>
</html>
