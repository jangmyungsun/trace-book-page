<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trace result</title>
</head>

<body style="font-family:sans-serif; padding:40px; line-height:2;">

<p id="playBtn" style="cursor:pointer;">
쌓인 것을 들어보세요
</p>

<p id="guide" style="opacity:0.5; font-size:12px;"></p>

<script>

// 🔴 재생 함수
document.getElementById("playBtn").onclick = function(){

  const breath = localStorage.getItem("breath");
  const ambient = localStorage.getItem("ambient");
  const personal = localStorage.getItem("personal");

  if (!breath || !ambient || !personal) {
    alert("아직 기록이 부족합니다");
    return;
  }

  document.getElementById("guide").innerText = "재생 중... 화면을 녹화하세요";

  const list = [breath, ambient, personal];

  list.forEach((src, i) => {

    const audio = new Audio(src);

    setTimeout(()=>{
      audio.play();
    }, i * 800);

  });
};

</script>

</body>
</html>
