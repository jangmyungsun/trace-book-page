<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; padding:40px; line-height:1.8;">

<p id="play" style="cursor:pointer;">
이 문장을 손으로 눌러 쌓인 것들을 들어보세요
</p>

<p id="guide" style="opacity:0.4; font-size:12px;"></p>

<!-- 진행 바 -->
<div style="margin-top:40px; width:100%; height:2px; background:#eee;">
  <div id="bar" style="width:0%; height:2px; background:#111;"></div>
</div>

<script>

document.getElementById("play").onclick = function(){

  const breath = localStorage.getItem("breath");
  const ambient = localStorage.getItem("ambient");
  const personal = localStorage.getItem("personal");

  if (!breath || !ambient || !personal) {
    document.getElementById("guide").innerText = "아직 모든 흔적이 모이지 않았습니다";
    return;
  }

  document.getElementById("guide").innerText = "화면을 녹화하면 이 기록을 가져갈 수 있습니다. <br><br> 원한다면 보내주세요. <br><br> 이 소리는 다시 만들어질 수 있습니다.<br><br> jangms5999@gmail.com";

  const bar = document.getElementById("bar");

  const sounds = [breath, ambient, personal];

  let totalDuration = 0;

  sounds.forEach((src, i) => {

    const audio = new Audio(src);

    audio.volume = 0;

    audio.onloadedmetadata = function(){
      totalDuration += audio.duration;
    };

    setTimeout(() => {

      audio.play();

      // 페이드 인
      let vol = 0;
      const fade = setInterval(() => {
        vol += 0.05;
        audio.volume = vol;
        if (vol >= 0.6) clearInterval(fade);
      }, 200);

    }, i * 1200);

  });

  // 진행 바 (약 6초 기준)
  let progress = 0;
  const duration = 6000;

  const interval = setInterval(() => {
    progress += 100 / (duration / 100);
    bar.style.width = progress + "%";

    if (progress >= 100) clearInterval(interval);
  }, 100);
};

</script>

</body>
</html>
