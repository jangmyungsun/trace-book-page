<script>

document.getElementById("play").onclick = function(){

  const breath = localStorage.getItem("breath");
  const ambient = localStorage.getItem("ambient");
  const personal = localStorage.getItem("personal");

  if (!breath || !ambient || !personal) {
    document.getElementById("guide").innerText = "아직 모든 흔적이 모이지 않았습니다";
    return;
  }

  document.getElementById("guide").innerHTML = `
<p>
화면을 녹화하면 <br><br>
이 순간을 가져갈 수 있습니다 <br><br>
원한다면 <br>
기록을 보내주세요 <br><br>
이 소리는 <br>
다시 만들어질 수 있습니다
</p>

<p style="margin-top:20px; opacity:0.6;">
  jangms5999@gmail.com
</p>
`;

  const bar = document.getElementById("bar");

  const sounds = [breath, ambient, personal];

  sounds.forEach((src, i) => {

    const audio = new Audio(src);

    audio.volume = 0;

    setTimeout(() => {

      audio.play();

      let vol = 0;
      const fade = setInterval(() => {
        vol += 0.05;
        audio.volume = vol;
        if (vol >= 0.6) clearInterval(fade);
      }, 200);

    }, i * 1200);

  });

  let progress = 0;
  const duration = 6000;

  const interval = setInterval(() => {
    progress += 100 / (duration / 100);
    bar.style.width = progress + "%";

    if (progress >= 100) clearInterval(interval);
  }, 100);
};

</script>
